<!DOCTYPE html>
<html ng-app="HeroApp">
<head>
    <meta charset="utf-8">
    <title>Hero Manager</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="app.js"></script>
    <style>
        .hero-card {
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border-radius: 8px;
            margin-bottom: 20px;
            padding: 16px;
            background: #fff;
        }

        .hero-img {
            width: 64px;
            height: 64px;
            object-fit: cover;
            border-radius: 8px;
            margin-right: 16px;
        }

        .form-section {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 32px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
    </style>
</head>
<body ng-controller="HeroController" class="bg-light">
    <div class="container py-4">
        <h1 class="mb-4 text-primary">Hero Manager</h1>
        <!-- Form nhập hero -->
        <div class="form-section">
            <h4 class="mb-3">Thêm Hero mới</h4>
            <form ng-submit="addHero()" class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Tên</label>
                    <input type="text" class="form-control" ng-model="newHero.name" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Role</label>
                    <input type="text" class="form-control" ng-model="newHero.role" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Element</label>
                    <input type="text" class="form-control" ng-model="newHero.element" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Image URL</label>
                    <input type="text" class="form-control" ng-model="newHero.imageUrl">
                </div>
                <div class="col-md-12">
                    <label class="form-label">Description</label>
                    <textarea class="form-control" ng-model="newHero.description"></textarea>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Rating</label>
                    <input type="number" class="form-control" ng-model="newHero.rating" min="1" max="5">
                </div>
                <div class="col-md-12">
                    <button type="submit" class="btn btn-success mt-3">Thêm Hero</button>
                </div>
            </form>
        </div>

        <!-- Danh sách hero -->
        <h4 class="mb-3">Danh sách Hero</h4>
        <div class="row">
            <div class="col-md-6 col-lg-4" ng-repeat="hero in heroes">
                <div class="hero-card d-flex align-items-center">
                    <img ng-src="{{hero.imageUrl || 'https://via.placeholder.com/64?text=Hero'}}" class="hero-img" alt="{{hero.name}}">
                    <div class="flex-grow-1">
                        <h5 class="mb-1 text-secondary">{{hero.name}}</h5>
                        <div><span class="badge bg-primary">{{hero.role}}</span> <span class="badge bg-info text-dark">{{hero.element}}</span></div>
                        <div class="mt-2 text-muted" style="font-size: 0.95em;">{{hero.description}}</div>
                        <div class="mt-1">
                            Rating:
                            <span ng-repeat="star in getStars(hero.rating)">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="gold" style="vertical-align:middle;">
                                    <polygon points="12,2 15,9 22,9.5 17,14.5 18.5,22 12,18 5.5,22 7,14.5 2,9.5 9,9" />
                                </svg>
                            </span>
                            <span class="fw-bold">({{hero.rating}})</span>
                        </div>
                    </div>
                    <button class="btn btn-outline-danger btn-sm ms-3" ng-click="deleteHero(hero.id)">
                        Xóa
                    </button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
